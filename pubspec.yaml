name: choke
description: "A modern decentralized BJJ match scoring and publishing app via Nostr."
publish_to: 'none'

version: 1.1.0+81

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Nostr
  nostr_tools: ^1.0.9
  web_socket_channel: ^2.4.0

  # Storage
  flutter_secure_storage: ^9.2.4

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  go_router: ^14.8.0

dev_dependencies:
  mutation_test: ^1.8.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  generate: true
  uses-material-design: true
